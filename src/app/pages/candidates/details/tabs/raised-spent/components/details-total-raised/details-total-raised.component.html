<div class="total-raised-chart-panel">
  <div class="total-raised-header">
    <div class="title">Total Raised</div>
    <div class="total" [style.color]="totalContributionsTextColor">
      {{ totalRaisedFormatted }}
    </div>
  </div>

  @if (raisedCategories) {
    <total-raised-bar
      class="total-raised-chart"
      [raisedCategories]="raisedCategories"
    ></total-raised-bar>
  }

  <div class="total-raised-footer">
    <more-information-icon [tooltipText]="tooltipText"></more-information-icon>
  </div>
</div>
